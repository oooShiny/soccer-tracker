<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#0B1120" />
  <meta name="background-color" content="#0B1120" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TeamTracker" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="TeamTracker" />
  <meta name="description" content="Co-ed soccer team performance tracker" />

  <!-- Prevent phone number detection styling -->
  <meta name="format-detection" content="telephone=no" />

  <title>TeamTracker</title>

  <style>
    /* Ensure full dark background during load */
    html, body, #root {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background-color: #0B1120;
      overflow: hidden;
      -webkit-overflow-scrolling: touch;
    }

    /* Loading state */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: #0B1120;
      z-index: 9999;
      transition: opacity 0.3s;
    }
    #loading span {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: #E8ECF4;
      margin-top: 12px;
    }
    #loading .dot {
      font-size: 32px;
    }

    /* Disable pull-to-refresh on mobile */
    body {
      overscroll-behavior-y: contain;
    }

    /* Safe area padding for notched phones */
    #root {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="dot">⚽</div>
    <span>TeamTracker</span>
  </div>
  <div id="root"></div>
</body>
</html>
